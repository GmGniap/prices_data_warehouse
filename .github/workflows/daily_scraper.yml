name: Daily Prices Scraper

on:
  schedule:
    - cron: '0 2 * * *'  # Runs every day at 2:00 AM UTC
  workflow_dispatch:      # Allows manual trigger

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    # Only run scheduled jobs on the main branch. Allow manual triggers on any branch.
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scrapers
      env:
        # Assuming there might be a remote database. If the DB is local SQLite, it will just save the file.
        # But this ensures the variable is available if needed by db_manager.py
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        python run_all_scrapers.py
